<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --nebula-purple: #9F7AEA;
            --nebula-blue: #4299E1;
            --nebula-glow: rgba(159, 122, 234, 0.4);
            --bg-glass: rgba(13, 17, 23, 0.85);
            --border-glass: rgba(255, 255, 255, 0.12);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: transparent;
            font-family: 'Outfit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            opacity: 0;
            transform: scale(0.9) translateY(10px);
            transition: 
                opacity 0.7s cubic-bezier(0.16, 1, 0.3, 1),
                transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .container.visible {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .pill {
            width: 44px; /* Start as a circle */
            height: 44px;
            background: var(--bg-glass);
            border-radius: 22px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            box-shadow: 
                0 12px 40px rgba(0, 0, 0, 0.4),
                inset 0 1px 1px rgba(255, 255, 255, 0.08);
            transition: 
                width 0.8s cubic-bezier(0.16, 1, 0.3, 1),
                background 0.4s ease,
                border-color 0.4s ease;
            overflow: hidden;
            white-space: nowrap;
        }

        .pill.active {
            width: 180px; /* Expand when active */
        }

        .logo-container {
            width: 14px;
            height: 14px;
            position: relative;
            flex-shrink: 0;
            margin-right: 12px;
        }

        .logo {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--nebula-purple), var(--nebula-blue));
            border-radius: 4.5px;
            box-shadow: 0 0 15px var(--nebula-glow);
            transition: all 0.3s ease;
        }

        .pill.processing .logo {
            animation: rotate 1.5s linear infinite;
            background: linear-gradient(135deg, #F6AD55, #ED64A6);
            box-shadow: 0 0 15px rgba(246, 173, 85, 0.4);
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .content {
            display: flex;
            align-items: center;
            gap: 12px;
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.4s 0.2s ease;
        }

        .pill.active .content {
            opacity: 1;
            transform: translateX(0);
        }

        .status-group {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .status-label {
            font-size: 11px;
            font-weight: 600;
            color: white;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            line-height: 1;
        }

        .status-sub {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 400;
            margin-top: 2px;
        }

        .visualizer {
            display: flex;
            align-items: center;
            gap: 3px;
            height: 20px;
        }

        .bar {
            width: 3px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 1.5px;
            transition: all 0.2s ease;
        }

        .pill.listening .bar {
            background: var(--nebula-purple);
            box-shadow: 0 0 8px var(--nebula-glow);
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="pill" id="pill">
            <div class="logo-container">
                <div class="logo"></div>
            </div>
            <div class="content">
                <div class="status-group">
                    <div class="status-label" id="status-label">Nebula</div>
                    <div class="status-sub" id="status-sub">Ready</div>
                </div>
                <div class="visualizer" id="visualizer">
                    <!-- Bars generated by JS -->
                </div>
            </div>
        </div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');
        const pill = document.getElementById('pill');
        const statusLabel = document.getElementById('status-label');
        const statusSub = document.getElementById('status-sub');
        const visualizer = document.getElementById('visualizer');
        
        const barCount = 8;
        const bars = [];
        for (let i = 0; i < barCount; i++) {
            const bar = document.createElement('div');
            bar.className = 'bar';
            visualizer.appendChild(bar);
            bars.push(bar);
        }

        let lastHeights = new Array(barCount).fill(4);
        let currentVolume = 0;
        let animationFrameId;

        function draw() {
            const isProcessing = pill.classList.contains('processing');
            const isListening = pill.classList.contains('listening');
            const isReady = pill.classList.contains('ready');
            
            if (isProcessing) {
                bars.forEach(b => b.style.height = '4px');
            } else {
                const normalized = Math.min(1.0, Math.max(0, (currentVolume - 30) / 250));
                bars.forEach((bar, i) => {
                    const wavePhase = (Date.now() / 150) + (i * 0.6);
                    const localFactor = isListening ? (0.4 + 0.6 * Math.sin(wavePhase)) : (isReady ? 0.1 : 0);
                    const targetH = Math.max(4, normalized * 24 * localFactor);
                    lastHeights[i] += (targetH - lastHeights[i]) * 0.3;
                    bar.style.height = `${lastHeights[i]}px`;
                    bar.style.opacity = isListening ? (0.3 + normalized * 0.7) : 0.1;
                });
            }
            animationFrameId = requestAnimationFrame(draw);
        }

        ipcRenderer.on('volume', (e, v) => { currentVolume = v; });

        ipcRenderer.on('start-visualizer', () => {
            document.querySelector('.container').classList.add('visible');
            pill.classList.add('active');
            pill.classList.remove('ready', 'listening', 'processing');
            statusLabel.innerText = "NEBULA";
            statusSub.innerText = "Waking up...";
            if (!animationFrameId) draw();
        });

        ipcRenderer.on('stop-visualizer', () => {
            document.querySelector('.container').classList.remove('visible');
            pill.classList.remove('active', 'ready', 'listening', 'processing');
            statusLabel.innerText = "NEBULA";
            statusSub.innerText = "Offline";
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
            bars.forEach(b => { b.style.height = '4px'; b.style.opacity = 0.1; });
        });

        ipcRenderer.on('status', (e, status) => {
            if (status === 'brain_ready') {
                pill.classList.add('ready');
                statusSub.innerText = "Ready to speak";
            } else if (status === 'transcribing') {
                pill.classList.add('processing');
                pill.classList.remove('listening');
                statusLabel.innerText = "THINKING";
                statusSub.innerText = "Transcribing...";
            } else if (status === 'listening') {
                pill.classList.add('listening');
                pill.classList.remove('processing');
                statusLabel.innerText = "NEBULA";
                statusSub.innerText = "I'm listening...";
            } else if (status === 'idle') {
                pill.classList.remove('processing', 'listening');
                statusLabel.innerText = "NEBULA";
                statusSub.innerText = "Ready to speak";
            }
        });
    </script>
</body>
</html>
